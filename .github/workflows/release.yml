name: release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.1"
  CHART_DIR: "./aegis"
  CHART_NAME: "aegis"
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  HELM_OCI_REPOSITORY: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ ! "${version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "release tags must match semver X.Y.Z or vX.Y.Z" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "major=${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"
          echo "minor=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "${GITHUB_OUTPUT}"

      - name: Validate release configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DOCKERHUB_IMAGE}" ]]; then
            echo "Repository variable DOCKERHUB_IMAGE must be configured" >&2
            exit 1
          fi

          if [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" || -z "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "Secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be configured" >&2
            exit 1
          fi

      - name: Validate repository versions
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          binary_version="$(awk -F'"' '/VERSION string =/ { print $2 }' version.go)"
          chart_version="$(awk -F': ' '/^version:/ { print $2 }' aegis/Chart.yaml)"
          app_version="$(awk -F'"' '/^appVersion:/ { print $2 }' aegis/Chart.yaml)"

          [[ "${binary_version}" == "${version}" ]] || {
            echo "version.go (${binary_version}) does not match tag version (${version})" >&2
            exit 1
          }

          [[ "${chart_version}" == "${version}" ]] || {
            echo "aegis/Chart.yaml version (${chart_version}) does not match tag version (${version})" >&2
            exit 1
          }

          [[ "${app_version}" == "${version}" ]] || {
            echo "aegis/Chart.yaml appVersion (${app_version}) does not match tag version (${version})" >&2
            exit 1
          }

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          go test ./configuration ./security
          go test ./server -run 'TestBuildUpstreamHeaders'

      - name: Run integration test
        shell: bash
        run: ./test/integration/run_httpbin_test.sh

      - name: Lint Helm chart
        shell: bash
        run: helm lint "${CHART_DIR}"

  docker-image:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker image metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=${{ needs.verify.outputs.version }}
            type=raw,value=${{ needs.verify.outputs.minor }}
            type=raw,value=${{ needs.verify.outputs.major }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-chart:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package "${CHART_DIR}" --destination dist

      - name: Log in to GHCR for Helm OCI push
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push Helm chart to GHCR
        shell: bash
        run: |
          set -euo pipefail
          helm push "dist/${CHART_NAME}-${{ needs.verify.outputs.version }}.tgz" "oci://${HELM_OCI_REPOSITORY}"

  github-release:
    runs-on: ubuntu-latest
    needs:
      - verify
      - docker-image
      - helm-chart
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package "${CHART_DIR}" --destination dist
          sha256sum "dist/${CHART_NAME}-${{ needs.verify.outputs.version }}.tgz" > "dist/${CHART_NAME}-${{ needs.verify.outputs.version }}.tgz.sha256"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "Docker image (Docker Hub):"
            echo "- \`${DOCKERHUB_IMAGE}:${{ needs.verify.outputs.version }}\`"
            echo "- \`${DOCKERHUB_IMAGE}:latest\`"
            echo
            echo "Docker image (GHCR):"
            echo "- \`${GHCR_IMAGE}:${{ needs.verify.outputs.version }}\`"
            echo "- \`${GHCR_IMAGE}:latest\`"
            echo
            echo "Helm chart (OCI):"
            echo "- \`oci://${HELM_OCI_REPOSITORY}/${CHART_NAME}:${{ needs.verify.outputs.version }}\`"
          } > release-notes.md

          gh release create "${GITHUB_REF_NAME}" \
            "dist/${CHART_NAME}-${{ needs.verify.outputs.version }}.tgz" \
            "dist/${CHART_NAME}-${{ needs.verify.outputs.version }}.tgz.sha256" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
